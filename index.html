<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noah & Levi's Chore Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Bungee&display=swap');

        :root {
            --bg-main: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --accent-primary: #6366f1;
            --accent-secondary: #ec4899;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .kid-name {
            font-family: 'Bungee', cursive;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .premium-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .active-tab-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .bubble {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            user-select: none;
            background: white;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
            padding: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .bubble:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .bubble:active {
            transform: scale(0.92);
        }

        .pop-animation {
            animation: pop 0.4s ease-out forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.5;
                filter: blur(4px);
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .tab-btn {
            @apply transition-all duration-300;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--accent-primary);
        }

        .nav-item.active .nav-icon {
            transform: translateY(-4px);
            filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.4));
        }

        .daily-tile {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.4);
        }

        .daily-tile:has(input:checked) {
            background: white;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .bottom-nav {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 70px;
            z-index: 1000;
            border-radius: 2.5rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 1rem;
        }

        .view-content {
            display: none;
        }

        .view-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="min-h-screen pb-32">

    <!-- Top Bar -->
    <div class="max-w-md mx-auto px-6 pt-8 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl text-indigo-600">Chore</h1>
            <h1 class="text-2xl -mt-2 text-pink-500">Adventure!</h1>
        </div>
        <div id="kidSelectorContainer" class="flex gap-2">
            <!-- Kid selector bubbles injected here -->
        </div>
    </div>

    <!-- MAIN VIEWS -->

        <section id="view-home" class="view-content active space-y-6">

                </div>

                </div>

                <div class="relative z-10">
                    <h2 id="displayKidName" class="text-2xl text-indigo-600 mb-1">NOAH</h2>

                    </div>

                <div class="flex gap-3 mt-8 relative z-10">
                    <button onclick="showBulkAddModal()"
                        class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-200 active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <span>+</span> ADD
                    </button>
                    <button onclick="showSpendModal()"
                        class="flex-1 bg-white text-pink-500 border border-pink-100 py-4 rounded-2xl font-bold text-sm shadow-sm active:scale-95 transition-transform flex items-center justify-center gap-2">
                        <span>💸</span> SPEND
                    </button>
                </div>
            </div>

            <!-- Daily Essentials -->
            <div class="glass rounded-[2rem] p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Daily Bundle</h3>
                    <span class="text-[10px] font-bold bg-emerald-100 text-emerald-600 px-2 py-1 rounded-lg">$0.50
                        BONUS</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <label class="daily-tile flex flex-col items-center justify-center p-3 rounded-2xl cursor-pointer">
                        <input type="checkbox" id="check-bed" class="hidden" onchange="checkDailyBundle()">
                        <img src="Icon Library/make-the-bed.png" class="w-10 h-10 mb-1 object-contain" alt="Bed">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Bed</span>
                    </label>
                    <label class="daily-tile flex flex-col items-center justify-center p-3 rounded-2xl cursor-pointer">
                        <input type="checkbox" id="check-room" class="hidden" onchange="checkDailyBundle()">
                        <img src="Icon Library/toys.png" class="w-10 h-10 mb-1 object-contain" alt="Room">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Room</span>
                    </label>
                    <label class="daily-tile flex flex-col items-center justify-center p-3 rounded-2xl cursor-pointer">
                        <input type="checkbox" id="check-teeth" class="hidden" onchange="checkDailyBundle()">
                        <img src="Icon Library/teeth-brushing.png" class="w-10 h-10 mb-1 object-contain" alt="Teeth">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Teeth</span>
                    </label>
                </div>
            </div>

            <!-- Periodic Chores -->
            <div>
                <h3 class="text-sm font-bold text-slate-400 mb-4 px-2 uppercase tracking-widest">Chores ($0.50 each)
                </h3>
                <div id="bubbleZone" class="grid grid-cols-3 gap-4">
                    <!-- Bubbles Injected Here -->
                </div>
            </div>
        </section>

        <!-- HISTORY VIEW -->
        <section id="view-history" class="view-content space-y-6">
            <div class="glass rounded-[2rem] p-6 premium-shadow">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl text-indigo-600">Activity</h2>
                    <input type="date" id="logDateFilter" onchange="renderLog()"
                        class="bg-indigo-50 text-indigo-600 text-xs font-bold p-2 rounded-xl border-none outline-none">
                </div>

                <div class="h-[200px] mb-6">
                    <canvas id="timelineChart"></canvas>
                </div>

                <div id="adventureLog" class="space-y-3 max-h-[400px] overflow-y-auto no-scrollbar">
                    <!-- Logs injected here -->
                </div>
            </div>
        </section>

        <!-- SETTINGS VIEW -->
        <section id="view-settings" class="view-content space-y-6">
            <div class="glass rounded-[2rem] p-6 premium-shadow">
                <h2 class="text-xl text-indigo-600 mb-6">Manage Kids</h2>

                <div id="settingsKidList" class="space-y-4 mb-8">
                    <!-- Kid edit rows injected here -->
                </div>

                <div class="pt-4 border-t border-indigo-50">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">Add New Kid</h3>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="newKidName" placeholder="Name..."
                            class="flex-1 px-4 py-3 rounded-xl border border-indigo-50 bg-indigo-50/30 outline-none focus:border-indigo-400">
                        <button onclick="addKid()"
                            class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-transform truncate">
                            Add Kid
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass rounded-[2rem] p-6">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">Manage Chores</h3>

                <div id="settingsChoreList" class="space-y-4 mb-8">
                    <!-- Chore rows injected here -->
                </div>

                <div class="pt-4 border-t border-indigo-50">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">New Custom Chore</h3>
                    <div class="flex gap-2">
                        <input type="text" id="customChoreInput" placeholder="New chore name..."
                            class="flex-1 px-4 py-3 rounded-xl border border-indigo-50 bg-indigo-50/30 outline-none focus:border-indigo-400">
                        <button onclick="addCustomChore()"
                            class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100">
                            Add
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

        <button onclick="showView('history')" id="nav-history" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"

            </svg>
            <span class="text-[10px] font-bold uppercase tracking-tighter">History</span>
        </button>
        <button onclick="showView('settings')" id="nav-settings" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"

            <span class="text-[10px] font-bold uppercase tracking-tighter">Settings</span>
        </button>
    </nav>

    <!-- Modals (Spent/Add) -->
    <div id="spendModal"
        class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <h3 class="text-3xl kid-name mb-4 text-rose-500">SPENDING!</h3>
            <div class="space-y-4">
                <input type="text" id="spendItem" placeholder="What did you buy?"
                    class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-rose-500">
                <input type="number" id="spendAmount" step="0.01" placeholder="Price"
                    class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-slate-50 outline-none text-xl font-bold focus:border-rose-500">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModals()" class="flex-1 font-bold text-slate-400">Cancel</button>
                <button onclick="confirmSpend()"
                    class="flex-[2] py-4 bg-rose-500 text-white rounded-2xl font-bold shadow-lg shadow-rose-500/30">Confirm</button>
            </div>
        </div>
    </div>

    <div id="bulkAddModal"
        class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <h3 class="text-3xl kid-name mb-4 text-teal-500">ADD FUNDS</h3>
            <div class="space-y-4">
                <input type="text" id="bulkReason" placeholder="Reason (e.g. Extra help, Birthday)"
                    class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-teal-500">
                <input type="number" id="bulkAmount" step="0.01" placeholder="Amount ($)"
                    class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-slate-50 outline-none text-xl font-bold focus:border-teal-500">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModals()" class="flex-1 font-bold text-slate-400">Cancel</button>
                <button onclick="confirmBulkAdd()"
                    class="flex-[2] py-4 bg-teal-600 text-white rounded-2xl font-bold shadow-lg shadow-teal-500/30">Add
                    Money</button>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if (type === 'earn') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // --- CONSTANTS ---
        const allIcons = [
            "car-wash.png", "ceiling-fan.png", "dish-washing.png", "dishwasher.png",
            "grass.png", "healthy-nutrition.png", "laundry-basket.png", "laundry.png",
            "make-the-bed.png", "mop.png", "mowing.png", "oven.png", "puppy.png",
            "road.png", "shower.png", "star.png", "swimming-pool.png", "table.png",
            "teeth-brushing.png", "toilet.png", "toys.png", "vacum-cleaner.png",
            "watering-can.png", "wind.png", "window.png"
        ];

        const defaultPeriodicChores = ["Vacuuming", "Laundry Sort", "Clean Table", "Clear Driveway", "Mop", "Clean Windows", "Wash Dishes", "Wash Clothes", "Ceiling Fans", "Clean Microwave", "Clean Shower and Sinks", "Clean Toilet", "Blow Leaves", "Weed Garden Beds", "Clean Car"];

        // --- STATE MANAGEMENT ---
        let state = {
            kids: [],
            currentKidId: null,
            periodicChores: [...defaultPeriodicChores],
            choreIcons: {
                "Vacuuming": "vacum-cleaner.png", "Laundry Sort": "laundry-basket.png", "Clean Table": "table.png",
                "Clear Driveway": "road.png", "Mop": "mop.png", "Clean Windows": "window.png",
                "Wash Dishes": "dish-washing.png", "Wash Clothes": "laundry.png", "Ceiling Fans": "ceiling-fan.png",
                "Clean Microwave": "oven.png", "Clean Shower and Sinks": "shower.png", "Clean Toilet": "toilet.png",
                "Blow Leaves": "wind.png", "Weed Garden Beds": "grass.png", "Clean Car": "car-wash.png",
                "Default": "star.png"
            },
            currentView: 'home'
        };

        function saveState() {
            localStorage.setItem('choreAdventureState', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('choreAdventureState');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Merge parsed state into current default state to ensure missing fields are populated
                state = { ...state, ...parsed };
                // Ensure choreIcons is also merged if it exists, to preserve defaults for old chores
                if (parsed.choreIcons) {
                    state.choreIcons = { ...state.choreIcons, ...parsed.choreIcons };
                }

                // Re-hydrate dates
                state.kids.forEach(k => {
                    k.history.forEach(h => { if (h.x) h.x = new Date(h.x) });
                    k.logs.forEach(l => { if (l.date) l.date = new Date(l.date) });
                });
            }
        }

        // --- UI ROUTING ---
        function showView(viewId) {
            state.currentView = viewId;
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`nav-${viewId}`).classList.add('active');

            if (viewId === 'history') initChart();
            if (viewId === 'settings') renderSettings();
            saveState();
        }

        // --- KID MANAGEMENT ---
        function addKid() {
            const input = document.getElementById('newKidName');
            const name = input.value.trim();
            if (!name) return;

            const newKid = {
                id: Date.now(),
                name: name,
                cash: 0,
                count: 0,
                history: [{ x: new Date(), y: 0 }],
                logs: [],
                dailyBundle: { bed: false, room: false, teeth: false, done: false }
            };

            state.kids.push(newKid);
            if (state.kids.length === 1) state.currentKidId = newKid.id;

            input.value = '';
            renderKidSelectors();
            renderSettings();
            updateUI();
            saveState();
        }

        function removeKid(id) {
            state.kids = state.kids.filter(k => k.id !== id);
            if (state.currentKidId === id) {
                state.currentKidId = state.kids.length > 0 ? state.kids[0].id : null;
            }
            renderKidSelectors();
            renderSettings();
            updateUI();
            saveState();
        }

        function switchKid(id) {
            state.currentKidId = id;
            updateUI();
            renderKidSelectors();
            saveState();
        }

        function renderKidSelectors() {
            const container = document.getElementById('kidSelectorContainer');
            container.innerHTML = '';
            state.kids.forEach(k => {
                const isActive = k.id === state.currentKidId;
                const bubble = document.createElement('button');
                bubble.onclick = () => switchKid(k.id);
                bubble.className = `w-10 h-10 min-w-[2.5rem] rounded-full font-bold text-sm flex items-center justify-center transition-all flex-shrink-0 ${isActive ? 'bg-indigo-600 text-white active-tab-glow' : 'bg-indigo-50 text-indigo-400'}`;
                bubble.innerText = k.name.charAt(0).toUpperCase();
                container.appendChild(bubble);
            });
        }

        function updateKidName(id, newName) {
            const kid = state.kids.find(k => k.id === id);
            if (kid) kid.name = newName;
            renderKidSelectors();
            updateUI();
            saveState();
        }

        function removeChore(choreName) {
            state.periodicChores = state.periodicChores.filter(c => c !== choreName);
            // Also cleanup icons if it was a custom one
            if (state.choreIcons[choreName] && !allIcons.includes(state.choreIcons[choreName])) {
                delete state.choreIcons[choreName];
            }
            renderSettings();
            updateUI();
            saveState();
        }

        function renderSettings() {
            // Render Kid List
            const kidContainer = document.getElementById('settingsKidList');
            kidContainer.innerHTML = '';
            state.kids.forEach(k => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-3 p-4 bg-white/50 rounded-2xl border border-white/50';
                row.innerHTML = `
                    <div class="w-10 h-10 min-w-[2.5rem] bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold flex-shrink-0">${k.name.charAt(0).toUpperCase()}</div>
                    <input type="text" value="${k.name}" onchange="updateKidName(${k.id}, this.value)" class="flex-1 min-w-0 bg-transparent border-none outline-none font-semibold text-slate-700">
                    <button onclick="removeKid(${k.id})" class="text-pink-500 p-2 hover:bg-pink-50 rounded-lg flex-shrink-0">🗑️</button>
                `;
                kidContainer.appendChild(row);
            });

            // Render Chore List
            const choreContainer = document.getElementById('settingsChoreList');
            if (!choreContainer) return;
            choreContainer.innerHTML = '';
            state.periodicChores.forEach((chore, index) => {
                const iconFile = state.choreIcons[chore] || state.choreIcons["Default"];
                const isCustom = !defaultPeriodicChores.includes(chore);
                const row = document.createElement('div');
                row.className = 'flex items-center gap-3 p-3 bg-white/30 rounded-xl border border-white/30';
                row.innerHTML = `
                    <img src="Icon Library/${iconFile}" class="w-10 h-10 object-contain flex-shrink-0" alt="${chore}">
                    <span class="flex-1 font-semibold text-slate-600 truncate">${chore}</span>
                    ${isCustom ? `<button onclick="removeChore('${chore}')" class="text-pink-400 p-2 hover:bg-pink-50 rounded-lg">🗑️</button>` : ''}
                `;
                choreContainer.appendChild(row);
            });
        }

        // --- GAME LOGIC ---
        function checkDailyBundle() {
            if (!state.currentKidId) return;
            const kid = state.kids.find(k => k.id === state.currentKidId);

            kid.dailyBundle.bed = document.getElementById('check-bed').checked;
            kid.dailyBundle.room = document.getElementById('check-room').checked;
            kid.dailyBundle.teeth = document.getElementById('check-teeth').checked;

            if (kid.dailyBundle.bed && kid.dailyBundle.room && kid.dailyBundle.teeth && !kid.dailyBundle.done) {
                kid.dailyBundle.done = true;
                rewardKid("Daily Trio Bundle", 0.50);
                updateUI();
            }
            saveState();
        }

        function rewardKid(itemName, amount) {
            const kid = state.kids.find(k => k.id === state.currentKidId);
            if (!kid) return;

            kid.cash += amount;
            if (amount === 0.50) kid.count += 1;

            const now = new Date();
            kid.history.push({ x: now, y: kid.cash });
            kid.logs.push({ type: 'EARN', item: itemName, amount: amount, date: now });

            playSound('earn');
            updateUI();
            saveState();
        }

        function confirmSpend() {
            const item = document.getElementById('spendItem').value.trim() || 'Shopping';
            const amount = parseFloat(document.getElementById('spendAmount').value) || 0;
            const kid = state.kids.find(k => k.id === state.currentKidId);

            if (kid && amount > 0) {
                kid.cash -= amount;
                const now = new Date();
                kid.history.push({ x: now, y: kid.cash });
                kid.logs.push({ type: 'SPEND', item: item, amount: amount, date: now });
                playSound('spend');
                updateUI();
                closeModals();
                saveState();
            }
        }

        function confirmBulkAdd() {
            const reason = document.getElementById('bulkReason').value.trim() || 'Extra Reward';
            const amount = parseFloat(document.getElementById('bulkAmount').value) || 0;
            if (amount > 0) {
                rewardKid(`🌟 ${reason}`, amount);
                closeModals();
            }
        }

        function popBubble(event, choreName) {
            const bubble = event.currentTarget;
            bubble.classList.add('pop-animation');
            setTimeout(() => {
                bubble.remove();
                rewardKid(choreName, 0.50);
                setTimeout(() => renderBubbles(), 8000);
            }, 400);
        }

        function addCustomChore() {
            const input = document.getElementById('customChoreInput');
            const val = input.value.trim();
            if (val) {
                state.periodicChores.push(val);
                // Use the official star icon
                state.choreIcons[val] = "star.png";

                input.value = '';
                renderBubbles();
                renderSettings();
                saveState();
            }
        }

        // --- RENDERING ---
        function updateUI() {
            if (!state.currentKidId) {
                document.getElementById('view-home').innerHTML = '<div class="flex flex-col items-center justify-center p-20 text-center opacity-50"><span class="text-6xl mb-4">👋</span><p class="font-bold">Add a kid in Settings to start!</p></div>';
                return;
            } else if (document.getElementById('view-home').innerHTML.includes('Add a kid')) {
                location.reload(); // Force full re-init if we just added the first kid
                return;
            }

            const kid = state.kids.find(k => k.id === state.currentKidId);
            document.getElementById('displayKidName').innerText = kid.name.toUpperCase();
            document.getElementById('displayCash').innerText = kid.cash.toFixed(2);
            document.getElementById('displayCount').innerText = kid.count;

            document.getElementById('check-bed').checked = kid.dailyBundle.bed;
            document.getElementById('check-room').checked = kid.dailyBundle.room;
            document.getElementById('check-teeth').checked = kid.dailyBundle.teeth;

            // Disable if done
            const bundleDone = kid.dailyBundle.done;
            document.querySelectorAll('.daily-tile input').forEach(inp => inp.disabled = bundleDone);

            renderBubbles();
            renderLog();
        }

        function renderBubbles() {
            const container = document.getElementById('bubbleZone');
            if (!container || !state.choreIcons) return;
            container.innerHTML = '';
            state.periodicChores.forEach((chore) => {
                const bubble = document.createElement('div');
                const iconFile = state.choreIcons[chore] || state.choreIcons["Default"];
                bubble.className = `bubble`;
                bubble.innerHTML = `
                    <img src="Icon Library/${iconFile}" class="w-12 h-12 mb-2 object-contain" alt="${chore}">
                    <span class="text-[10px] uppercase font-bold text-center leading-tight text-slate-500">${chore}</span>`;
                bubble.onclick = (e) => popBubble(e, chore);
                container.appendChild(bubble);
            });
        }

        function renderLog() {
            const logContainer = document.getElementById('adventureLog');
            if (!logContainer) return;
            const filterDate = document.getElementById('logDateFilter').value;
            logContainer.innerHTML = '';

            let allLogs = [];
            state.kids.forEach(k => {
                k.logs.forEach(l => allLogs.push({ ...l, kidName: k.name }));
            });

            if (filterDate) {
                allLogs = allLogs.filter(e => e.date.toISOString().split('T')[0] === filterDate);
            }

            allLogs.sort((a, b) => b.date - a.date);

            if (allLogs.length === 0) {
                logContainer.innerHTML = '<p class="text-slate-400 italic text-center text-xs py-8">No activity yet.</p>';
                return;
            }

            allLogs.forEach(entry => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex justify-between items-center transition-all ${entry.type === 'EARN' ? 'bg-emerald-50 text-emerald-700' : 'bg-pink-50 text-pink-700'}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-lg">${entry.type === 'EARN' ? '✨' : '💸'}</div>
                        <div>
                            <div class="font-bold text-sm">${entry.kidName}: ${entry.item}</div>
                            <div class="opacity-60 text-[10px] font-bold uppercase">${new Date(entry.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    </div>
                    <div class="font-bold">
                        ${entry.type === 'EARN' ? '+' : '-'}$${entry.amount.toFixed(2)}
                    </div>`;
                logContainer.appendChild(card);
            });
        }

        // --- CHART ---
        let timelineChart;
        function initChart() {
            const ctx = document.getElementById('timelineChart');
            if (!ctx) return;

            if (timelineChart) timelineChart.destroy();

            const datasets = state.kids.map(k => ({
                label: k.name,
                borderColor: k.id === state.currentKidId ? '#6366f1' : '#cbd5e1',
                borderWidth: k.id === state.currentKidId ? 3 : 1,
                data: k.history,
                tension: 0.4,
                pointRadius: 0
            }));

            timelineChart = new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', display: false },
                        y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // --- HELPERS ---
        window.showSpendModal = () => document.getElementById('spendModal').classList.replace('hidden', 'flex');
        window.showBulkAddModal = () => document.getElementById('bulkAddModal').classList.replace('hidden', 'flex');
        window.closeModals = () => {
            document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.replace('flex', 'hidden'));
        };

        // --- INITIALIZATION ---
        window.onload = () => {
            loadState();
            renderKidSelectors();
            updateUI();
            document.getElementById('logDateFilter').valueAsDate = new Date();
            // Show Home by default
            showView(state.currentView || 'home');
        };
    </script>
</body>

</html>
